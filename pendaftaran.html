<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Imam & Muadzin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 0; margin: 0; }
        
        /* HEADER DENGAN LOGO DI SAMPING */
        .header-container { 
            width: 100%; 
            background: white; 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-bottom: 30px;
        }
        .logo-img { 
            width: 50px; 
            height: 50px; 
            object-fit: contain; 
            margin-right: 15px; 
        }
        .header-text h1 { 
            margin: 0; 
            font-size: 1.2rem; 
            color: #1b5e20; 
            line-height: 1.2;
        }
        .header-text p { 
            margin: 2px 0 0; 
            font-size: 0.85rem; 
            color: #666; 
        }

        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 400px; margin-bottom: 30px; }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; margin-bottom: 25px; font-size: 1.4rem; }
        
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #34495e; font-size: 0.9rem; }
        input[type="text"] { width: 100%; padding: 14px; margin-bottom: 20px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #fdfdfd; }
        input[type="text"]:focus { border-color: #27ae60; outline: none; background: white; }
        
        .radio-group { margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .radio-option { 
            border: 1.5px solid #eee; 
            padding: 12px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .radio-option input { margin-right: 8px; accent-color: #27ae60; }
        .radio-option:has(input:checked) { border-color: #27ae60; background: #f0fdf4; color: #1b5e20; font-weight: bold; }
        
        button { width: 100%; background-color: #27ae60; color: white; border: none; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #219150; transform: translateY(-2px); }
        
        #msg { display: none; text-align: center; padding: 20px; color: #27ae60; font-weight: bold; }

        .info-section { width: 90%; max-width: 500px; text-align: center; margin-bottom: 50px; }
        .info-title { font-weight: bold; margin-bottom: 15px; color: #999; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        .poster-img { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="header-container">
        <!-- GANTI URL LOGO DI SINI -->
        <img src="img/media-logo-1-01.png" class="logo-img" alt="Logo Masjid">
        <div class="header-text">
            <h1>Masjid Al-Muhajirin</h1>
            <p>Pendaftaran Online Pelayan Masjid</p>
        </div>
    </div>

    <div class="card">
        <h2>Formulir Pendaftaran</h2>
        <form id="pendaftaranForm">
            <label>Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Ketik nama lengkap..." required>
            
            <label>Posisi</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="posisi" value="Imam" required> Imam</label>
                <label class="radio-option"><input type="radio" name="posisi" value="Muadzin"> Muadzin</label>
            </div>
            
            <button type="submit" id="submitBtn">Kirim Sekarang</button>
        </form>
        <div id="msg">✅ Data Berhasil Terkirim!</div>
    </div>

    <div class="info-section">
        <div class="info-title">Info Lengkap</div>
        <img src="img/pendaftaran.png" class="poster-img">
    </div>

    <script>
        const scriptURL = 'PASTE_URL_WEB_APP_GOOGLE_LO_DI_SINI'; 
        const form = document.getElementById('pendaftaranForm');
        
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = 'Sedang Mengirim...';

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({
                    nama: document.getElementById('nama').value,
                    posisi: form.elements['posisi'].value
                }),
            })
            .then(() => {
                form.style.display = 'none';
                document.getElementById('msg').style.display = 'block';
            })
            .catch(() => {
                alert('Gagal, coba lagi Bro!');
                btn.disabled = false;
                btn.innerHTML = 'Kirim Sekarang';
            });
        });
    </script>
</body>
</html>
